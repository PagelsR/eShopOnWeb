version: v0.1
testName: eShopOnWeb_Load_Test
testPlan: API_Testing.jmx
description: Load test for eShopOnWeb web application pages
engineInstances: 1
env:
  - name: webapp
    value: app-web-uifggh2tkbo2y.azurewebsites.net
failureCriteria:
  # Global criteria
  - avg(response_time_ms) > 5000
  - percentage(error) > 20
  # Per-sampler criteria (sampler name must match testname in JMX)
  - Catalog - Home Page: avg(latency) > 4000
  - Catalog - Page 2: avg(latency) > 4000
  - Shopping Basket: avg(latency) > 4000
  - Account Login: avg(latency) > 4000

autoStop:
  errorPercentage: 85
  timeWindow: 120
